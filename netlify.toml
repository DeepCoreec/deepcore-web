[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://alisson-voz-server-production.up.railway.app; img-src 'self' data: https:; frame-ancestors 'none';"

[[redirects]]
  from = "/index_backup_v1.html"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/index_backup_v2.html"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/script_backup_v2.js"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/style_backup_v1.css"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/style_backup_v2.css"
  to = "/404.html"
  status = 404
