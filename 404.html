<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — DeepCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050508; color: #ffffff;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      overflow: hidden;
    }
    .bg-glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,0,34,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .content { position: relative; z-index: 1; max-width: 480px; }
    .logo {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 48px;
      text-decoration: none;
    }
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.1rem; font-weight: 900;
      letter-spacing: 3px; color: white;
    }
    .logo-text span { color: #FF0022; }
    .error-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(7rem, 20vw, 12rem);
      font-weight: 800; line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(255,0,34,0.3);
      margin-bottom: 8px;
      position: relative;
    }
    .error-num::after {
      content: '404';
      position: absolute; inset: 0;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,0,34,0.1);
      transform: translate(4px, 4px);
    }
    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      margin-bottom: 16px; color: white;
    }
    .error-desc {
      color: #7a7d94; font-size: 0.95rem;
      line-height: 1.7; margin-bottom: 40px;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #FF0022; color: white;
      border: none; padding: 14px 28px; border-radius: 6px;
      font-size: 0.88rem; font-weight: 700;
      cursor: pointer; text-decoration: none;
      letter-spacing: 1px; text-transform: uppercase;
      transition: all 0.25s;
    }
    .btn:hover { background: #FF1A35; transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,0,34,0.35); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      color: #7a7d94; text-decoration: none;
      font-size: 0.85rem; margin-left: 20px;
      transition: color 0.2s;
    }
    .btn-ghost:hover { color: white; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="content">
    <a class="logo" href="/">
      <svg width="32" height="32" viewBox="0 0 40 40">
        <polygon points="20,2 35,10.5 35,29.5 20,38 5,29.5 5,10.5" fill="none" stroke="#FF0022" stroke-width="2"/>
        <polygon points="20,8 29,13 29,27 20,32 11,27 11,13" fill="none" stroke="#FF0022" stroke-width="1.2" opacity="0.5"/>
        <circle cx="20" cy="20" r="5" fill="#FF0022"/>
        <circle cx="20" cy="20" r="2" fill="white" opacity="0.9"/>
      </svg>
      <span class="logo-text">Deep<span>Core</span></span>
    </a>
    <div class="error-num">404</div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-desc">La página que buscas no existe o fue movida.<br>Pero no te preocupes — podemos ayudarte igual.</p>
    <div>
      <a class="btn" href="/">← Volver al inicio</a>
      <a class="btn-ghost" href="https://wa.me/593986225038" target="_blank">Contactar →</a>
    </div>
  </div>
</body>
</html>
